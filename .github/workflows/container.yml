name: Container Build & Push

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the base image and push it.  The build is slow (dnf + dracut)
      # so GHA layer cache is critical for subsequent runs.
      - name: Build and push composefs-os:fedora-44 (GRUB)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.fedora
          target: grub
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/composefs-os:fedora-44
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push composefs-os:fedora-44-uki (systemd-boot + UKI)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.fedora
          target: uki
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/composefs-os:fedora-44-uki
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push composefs-os:fedora-44-uki-sb (systemd-boot + UKI + Secure Boot)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.fedora
          target: uki-secureboot
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/composefs-os:fedora-44-uki-sb
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push composefs-os:ubuntu-26.04 (GRUB)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.ubuntu
          target: grub
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/composefs-os:ubuntu-26.04
          cache-from: type=gha,scope=ubuntu
          cache-to: type=gha,mode=max,scope=ubuntu

      - name: Build and push composefs-os:ubuntu-26.04-uki (systemd-boot + UKI)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.ubuntu
          target: uki
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/composefs-os:ubuntu-26.04-uki
          cache-from: type=gha,scope=ubuntu
          cache-to: type=gha,mode=max,scope=ubuntu

      - name: Build and push composefs-os:ubuntu-26.04-uki-sb (systemd-boot + UKI + Secure Boot)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.ubuntu
          target: uki-secureboot
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/composefs-os:ubuntu-26.04-uki-sb
          cache-from: type=gha,scope=ubuntu
          cache-to: type=gha,mode=max,scope=ubuntu
