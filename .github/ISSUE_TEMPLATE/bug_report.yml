name: Bug Report
description: Report a bug in cbootc or the example images
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. podman run ...
        2. cbootc install to-disk ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Image / cbootc version
      description: Output of `cbootc status` or image tag.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: text
    validations:
      required: false
